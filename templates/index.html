<!DOCTYPE html>
<html>
<head>
    <title>JARVIS GOLD</title>
    <style>
        body { background: #000; color: #00ffcc; font-family: monospace; text-align: center; }
        .bunker { border: 2px solid #00ffcc; padding: 20px; margin: 20px auto; width: 300px; }
        #log { height: 150px; overflow-y: auto; text-align: left; border: 1px solid #222; padding: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="bunker">
        <h1>JARVIS GOLD</h1>
        <div id="log">> Esperando...</div>
        <input type="text" id="box" placeholder="Escribe 'hola'..." style="width:100px;">
        <button onclick="enviar()">OK</button>
    </div>

    <script>
        async function enviar() {
            const box = document.getElementById('box');
            const log = document.getElementById('log');
            const res = await fetch('/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: box.value})
            });
            const data = await res.json();
            log.innerHTML += `<br>E: ${box.value}<br>J: ${data.response}`;
            box.value = '';
        }
    </script>
</body>
</html>
